project:
  name: "Emotion-Aware Speech Foundation Model"
  version: "1.0.0"
  base_dir: "/home/barath/Emotion_Voice"

audio:
  sample_rates:
    - 22050
    - 24000
  default_sample_rate: 22050
  channels: 1
  bit_depth: 16
  format: "wav"
  chunk_size: 1024

preprocessing:
  normalize_db: -20.0
  silence_threshold_db: -40.0
  silence_min_duration_ms: 200
  noise_reduction_strength: 0.15
  trim_top_db: 30
  hop_length: 256
  win_length: 1024
  n_fft: 1024
  n_mels: 80
  fmin: 0
  fmax: 8000
  mel_fmin: 0.0
  mel_fmax: null

emotion:
  labels:
    - neutral
    - happy
    - sad
    - angry
    - excited
    - fear
    - surprise
    - calm
    - serious
  model_name: "j-hartmann/emotion-english-distilroberta-base"
  fallback_model: "bhadresh-savani/distilbert-base-uncased-emotion"
  intensity_threshold: 0.5
  cache_dir: "models/emotion_classifier"
  device: "auto"

prosody:
  pitch_min: 50.0
  pitch_max: 600.0
  energy_min: 0.0
  energy_max: 1.0
  speed_min: 0.5
  speed_max: 2.0
  emotion_prosody_map:
    neutral:
      pitch: 1.0
      energy: 1.0
      speed: 1.0
      pause_factor: 1.0
    happy:
      pitch: 1.2
      energy: 1.3
      speed: 1.1
      pause_factor: 0.8
    sad:
      pitch: 0.85
      energy: 0.7
      speed: 0.85
      pause_factor: 1.3
    angry:
      pitch: 1.1
      energy: 1.6
      speed: 1.15
      pause_factor: 0.7
    excited:
      pitch: 1.4
      energy: 1.5
      speed: 1.2
      pause_factor: 0.6
    fear:
      pitch: 1.25
      energy: 0.9
      speed: 1.3
      pause_factor: 0.9
    surprise:
      pitch: 1.35
      energy: 1.2
      speed: 1.0
      pause_factor: 0.85
    calm:
      pitch: 0.95
      energy: 0.8
      speed: 0.9
      pause_factor: 1.2
    serious:
      pitch: 0.9
      energy: 1.1
      speed: 0.92
      pause_factor: 1.1
    motivational:
      pitch: 1.3
      energy: 1.4
      speed: 1.05
      pause_factor: 0.75
    questioning:
      pitch: 1.15
      energy: 0.95
      speed: 0.95
      pause_factor: 1.05
    storytelling:
      pitch: 1.1
      energy: 1.0
      speed: 0.95
      pause_factor: 1.15

tts:
  # Primary: "vits" (200MB, fast, CPU-friendly)
  # Optional: "xtts" (2.5GB, multilingual voice cloning) — switch when disk allows
  model_type: "vits"
  model_id: "tts_models/en/vctk/vits"
  multilingual_model_id: "tts_models/multilingual/multi-dataset/xtts_v2"
  fallback_model: "tts_models/en/ljspeech/vits"
  models_dir: "models/tts_model"
  languages:
    - en
    - ta
    - hi
    - fr
    - de
    - es
    - it
    - pt
    - ru
    - zh-cn
    - ja
    - ko
    - nl
    - pl
    - tr
    - cs
    - ar
  default_language: "en"
  voice_samples_dir: "data/voice_samples"
  use_gpu: false
  device: "cpu"

vocoder:
  model_type: "hifigan"
  model_path: "models/vocoder/hifigan"
  use_gpu: false

streaming:
  chunk_size_tokens: 20
  buffer_size_ms: 100
  target_latency_ms: 500
  max_latency_ms: 1000
  websocket_ping_interval: 20

api:
  host: "0.0.0.0"
  port: 8000
  workers: 2
  reload: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
  max_text_length: 5000
  rate_limit_per_minute: 60
  # API key authentication — set via API_KEY env var or here
  # Leave empty to disable (for local development only)
  api_key: ""
  require_api_key: false

voice_cloning:
  min_sample_duration_sec: 3.0
  max_sample_duration_sec: 30.0
  required_samples: 1
  recommended_samples: 5
  voice_embedding_dim: 512
  voice_profiles_dir: "data/voice_profiles"

training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 100
  checkpoint_every: 10
  eval_every: 5
  mixed_precision: false
  gradient_clip: 1.0
  checkpoints_dir: "training/checkpoints"
  logs_dir: "training/logs"

storage:
  database_url: "sqlite:///emotion_voice.db"
  redis_url: "redis://localhost:6379"
  object_storage_path: "data/storage"

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file: "logs/emotion_voice.log"
  max_bytes: 10485760
  backup_count: 5

mlflow:
  tracking_uri: "http://localhost:5001"
  experiment_name: "emotion-voice-training"
